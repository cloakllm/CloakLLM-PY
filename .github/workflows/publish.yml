name: Publish to PyPI

on:
  push:
    tags: ["v*"]

# v0.6.1 H7: scoped permissions + concurrency lock to prevent racing publishes.
# v0.6.3 I6: OIDC trusted publishing — no long-lived token in CI.
permissions:
  contents: read
  id-token: write  # required for OIDC trusted publishing to PyPI

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    # v0.6.3 I6: GitHub Environment provides extra protection — required reviewers,
    # branch/tag restrictions, and a clean audit trail of every release.
    # Configure at: Settings → Environments → New environment "pypi"
    # (Environment is OPTIONAL: if it does not exist, the job runs unprotected.)
    environment:
      name: pypi
      url: https://pypi.org/p/cloakllm

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      # v0.6.3 I6: OIDC trusted publishing replaces the long-lived PYPI_API_TOKEN.
      # Prerequisite (one-time): configure trusted publisher at
      #   https://pypi.org/manage/project/cloakllm/settings/publishing/
      # with:
      #   Owner:        cloakllm
      #   Repository:   cloakllm-py
      #   Workflow:     publish.yml
      #   Environment:  pypi
      # See: https://docs.pypi.org/trusted-publishers/
      # After first successful OIDC publish, delete the PYPI_API_TOKEN secret.
      - name: Publish to PyPI (OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # No `password:` — action uses the OIDC token automatically.
          # Skip duplicates so re-running an already-published tag is a no-op
          # rather than a hard failure.
          skip-existing: true
          print-hash: true
