name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# v0.6.1 H7: least-privilege defaults + cancel-on-superseding-push.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev,litellm]"

      - name: Download spaCy model
        run: python -m spacy download en_core_web_sm

      - name: Run tests
        run: pytest tests/ -v

      # v0.6.1 H6: scan installed deps for known CVEs each CI run.
      - name: Audit dependencies (pip-audit)
        run: pip-audit
        continue-on-error: true
        # NOTE: pip-audit failures are non-fatal until v0.7 to avoid breaking
        # CI on transitive dep CVEs we cannot immediately patch. Operators
        # should monitor the output and pin/upgrade as needed.
