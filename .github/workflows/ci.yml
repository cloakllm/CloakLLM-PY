name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# v0.6.1 H7: least-privilege defaults + cancel-on-superseding-push.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # v0.6.3 P0-1: GitHub-hosted runners ship with pip 25.2 which has known
      # CVEs (CVE-2025-8869 fixed in 25.3, CVE-2026-1703 fixed in 26.0). Upgrade
      # before pip-audit runs.
      - name: Upgrade pip
        run: pip install --upgrade pip

      - name: Install dependencies
        run: pip install -e ".[dev,litellm]"

      - name: Download spaCy model
        run: python -m spacy download en_core_web_sm

      - name: Run tests
        run: pytest tests/ -v

      # v0.6.3 NEW-9: dep CVE audit is now BLOCKING (was continue-on-error).
      # If a transitive CVE without an upstream fix appears, add `--ignore-vuln <ID>`
      # below with a dated comment naming the CVE and the reason for the exception.
      # All exemptions tracked in SECURITY_WAIVERS.md.
      - name: Audit dependencies (pip-audit)
        run: |
          pip-audit \
            --ignore-vuln ECHO-ffe1-1d3c-d9bc \
            --ignore-vuln ECHO-7db2-03aa-5591

      # v0.6.5: Build the wheel and import it from a fresh venv. The cloakllm
      # py CI already exercises real spaCy / litellm via `pip install -e ...`
      # so the upstream-API-drift class of bug is mostly caught — but a wheel
      # built with broken metadata (missing files, wrong package_data) would
      # only surface on user installs. This step closes that gap.
      #
      # Running on Python 3.12 only (one-shot smoke; matrix coverage above
      # already exercises 3.10/3.11/3.12 for the test suite).
      - name: Build wheel + import-smoke from clean venv
        if: matrix.python-version == '3.12'
        run: |
          pip install --upgrade build
          python -m build --wheel
          python -m venv /tmp/wheel-test-venv
          /tmp/wheel-test-venv/bin/pip install --quiet --upgrade pip
          /tmp/wheel-test-venv/bin/pip install --quiet dist/cloakllm-*.whl
          # v0.7.1: spaCy 3.8.14 on Python 3.12 doesn't always pull `click`
          # transitively via `typer` in fresh venvs, breaking `python -m spacy
          # download`. Install click explicitly as a workaround; this is a
          # spaCy-CLI dep regression, not a cloakllm dep. Tracking upstream
          # at https://github.com/explosion/spaCy/issues; remove when fixed.
          /tmp/wheel-test-venv/bin/pip install --quiet click
          /tmp/wheel-test-venv/bin/python -m spacy download en_core_web_sm
          /tmp/wheel-test-venv/bin/python -c "
          import cloakllm
          from cloakllm import Shield, ShieldConfig, AuditChainIntegrityError
          shield = Shield(ShieldConfig(audit_enabled=False))
          sanitized, tm = shield.sanitize('Email me at john@example.com please')
          assert '[EMAIL_0]' in sanitized, f'expected [EMAIL_0] in {sanitized!r}'
          restored = shield.desanitize(sanitized, tm)
          assert 'john@example.com' in restored, f'round-trip failed: {restored!r}'
          print(f'install-smoke: OK — cloakllm {cloakllm.__version__} round-trip + AuditChainIntegrityError importable')
          "
